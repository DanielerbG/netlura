<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlura</title>
    <link rel="stylesheet" href="catalogo.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Navbar -->
    <header class="navbar" id="navbar">
        <div class="navbar-left">
            <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg"
                alt="Netflix">
            <nav>
                <ul class="nav-links">
                    <li><a href="http://127.0.0.1:5500/catalogo/catalogo.html" class="active">Início</a></li>
                    <li><a href="http://127.0.0.1:5500/catalogo/catalogo.html">Séries</a></li>
                    <li><a href="http://127.0.0.1:5500/catalogo/catalogo.html">Filmes</a></li>
                    <li><a href="http://127.0.0.1:5500/catalogo/catalogo.html">Bombando</a></li>
                    <li><a href="http://127.0.0.1:5500/catalogo/catalogo.html">Minha lista</a></li>
                </ul>
            </nav>
        </div>
        <div class="navbar-right">
            <i class="fas fa-search icon"></i>
            <a href="../index.html" class="kids-link" id="perfil-nome">Seu nome</a>
            <div class="nav-notification">
                <i class="fas fa-bell icon"></i>
                <span class="notification-badge">42</span>
            </div>
            <a href="../index.html" class="profile-menu" style="text-decoration: none; color: inherit;">
                <img class="profile-icon" id="perfil-imagem" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png"
                    alt="Profile">
                <i class="fas fa-caret-down icon" style="font-size: 14px; margin-left: 5px;"></i>
            </a>
        </div>
    </header>

    <!-- Sliders Container -->
    <main class="sliders-container" id="main-content">
        <!-- Javascript will inject the rows here -->
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <a href="https://www.alura.com.br/" target="_blank">
                <p>Imersão Alura AI</p>
            </a>
            <ul class="footer-links">
                <li><a href="https://www.alura.com.br/" target="_blank">Para aprender mais</a></li>
                <li><a href="https://www.alura.com.br/" target="_blank">Perguntas frequentes</a></li>
                <li><a href="https://www.alura.com.br/" target="_blank">Centro de ajuda</a></li>
                <li><a href="https://www.alura.com.br/" target="_blank">Conta</a></li>
                <li><a href="https://www.alura.com.br/" target="_blank">Carreiras</a></li>
                <li><a href="https://www.alura.com.br/" target="_blank">Entre em contato</a></li>
            </ul>
        </div>
    </footer>

    <script type="module" src="js/main.js"></script>
    
    <script>
        // Recuperar e exibir perfil ativo ao carregar a página
        window.addEventListener('load', () => {
            const perfilAtivo = localStorage.getItem('perfilAtivo');
            
            if (perfilAtivo) {
                try {
                    const perfil = JSON.parse(perfilAtivo);
                    
                    // Atualizar nome do perfil
                    const perfilNome = document.getElementById('perfil-nome');
                    if (perfilNome) {
                        perfilNome.textContent = perfil.nome;
                    }
                    
                    // Atualizar imagem do perfil
                    const perfilImagem = document.getElementById('perfil-imagem');
                    if (perfilImagem) {
                        perfilImagem.src = perfil.imagem;
                        perfilImagem.alt = perfil.alt || perfil.nome;
                    }
                } catch (error) {
                    console.error('Erro ao recuperar perfil do localStorage:', error);
                }
            }
        });
    </script>
</body>

</html>
